<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Latar belakang transparan agar menyatu dengan warna card (terang/gelap) -->
  <rect width="100%" height="100%" fill="transparent" />
  
  <!-- Lingkaran dekoratif abu-abu netral -->
  <circle cx="200" cy="130" r="75" fill="none" stroke="#888888" stroke-width="2" stroke-dasharray="8 8" opacity="0.3" />
  <circle cx="200" cy="130" r="55" fill="none" stroke="#aaaaaa" stroke-width="1" opacity="0.2" />
  
  <!-- Ikon Toga (Graduation Cap) mode line-art abu-abu netral -->
  <g transform="translate(152, 85) scale(4)" fill="none" stroke="#777777" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M22 10v6" stroke-width="1.5" />
    <path d="M6 12v5c3 3 9 3 12 0v-5" />
    <path d="M2 10l10-5 10 5-10 5z" />
  </g>
  
  <!-- Label teks abu-abu netral -->
  <text x="200" y="250" text-anchor="middle" fill="#777777" font-family="'Plus Jakarta Sans', sans-serif, system-ui" font-weight="800" font-size="22px" opacity="0.7" letter-spacing="2px" text-transform="uppercase">EDUCATION</text>
  
</svg>
